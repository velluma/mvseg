# 3D Residual UNet (MONAI) + LightningModule hyperparameters.
_target_: mvseg.models.lit_module.MVSegLitModule

# --- network (monai.networks.nets.UNet with num_res_units>0 == Residual UNet) ---
net:
  _target_: mvseg.models.residual_unet.build_residual_unet
  spatial_dims: 3
  in_channels: 1
  out_channels: ${num_classes}
  channels: [16, 32, 64, 128, 256]
  strides: [2, 2, 2, 2]
  num_res_units: 2
  norm: INSTANCE
  dropout: 0.0

# --- loss ---
# name: dice_ce | dice_focal | dice_ce_cldice | dice_focal_cldice
# The "_cldice" variants add a topology-preserving centerline-Dice term on the
# classes in `cldice_classes` (see configs/experiment/resunet_cldice.yaml).
loss:
  name: dice_ce
  include_background: false
  lambda_dice: 1.0
  lambda_ce: 1.0
  # clDice term (only used by the "_cldice" variants):
  # cldice_classes: [4]    # aortic-valve annulus (thin ring)
  # lambda_cldice: 0.5     # weight relative to the base loss
  # cldice_iters: 10       # soft-skeletonization steps (>= thickest half-radius)

# Classes to compute topology metrics for at val/test (betti0 error, clDice
# score, connected-component rate). null disables. Enable to measure ring breaks.
topo_classes: null

# --- optimization ---
optimizer:
  name: adamw             # adamw | sgd
  lr: 1e-3
  weight_decay: 1e-5
scheduler:
  name: cosine            # cosine | polynomial | none
  warmup_epochs: 0

# --- inference ---
sliding_window: false     # 128^3 fits whole; enable for larger inputs
sw_roi_size: ${data.spatial_size}
sw_batch_size: 4
sw_overlap: 0.5

# how often (in epochs) to log prediction overlays to wandb
viz_every_n_epochs: 10
