# Passed (mostly) straight to lightning.Trainer
max_epochs: 300
accelerator: auto           # "gpu" | "cpu" | "auto"
devices: auto
precision: 16-mixed         # "32-true" for full precision / CPU
gradient_clip_val: 1.0
accumulate_grad_batches: 1
log_every_n_steps: 10
num_sanity_val_steps: 1
check_val_every_n_epoch: 1
deterministic: ${deterministic}

# Debugging helpers
fast_dev_run: false
overfit_batches: 0.0
limit_train_batches: 1.0
limit_val_batches: 1.0

# Checkpointing (ModelCheckpoint on the monitored metric)
monitor: val/dice_mean_fg
monitor_mode: max
save_top_k: 3
early_stopping: false
early_stopping_patience: 50
